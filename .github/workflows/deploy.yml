name: Deploy Test App to Minikube

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted   # WSL runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image inside Minikube
        run: |
          eval $(minikube docker-env)
          docker build -t test-app:latest ./app

      - name: Cleanup old resources
        run: |
          kubectl delete -f k8s/deployment.yaml --ignore-not-found
          kubectl delete -f k8s/service.yaml --ignore-not-found

      - name: Deploy to Minikube
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for Deployment to be Ready
        run: |
          kubectl rollout status deployment/test-app --timeout=180s

      - name: Verify Pods
        run: kubectl get pods -o wide

      - name: Smoke Test App
        run: |
          kubectl port-forward svc/test-app-service 8080:80 &
          sleep 10
          curl -s http://localhost:8080
